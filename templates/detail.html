<br>{% extends "base.html" %}
{% block content %}
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/4.13.0/d3.min.js"></script>
<link rel="stylesheet" href="https://www.visualcrossing.com/widgets/forecast/weather-forecast-widget-d3.css">
<script src="https://unpkg.com/maplibre-basemaps@0.0.6/dist/maplibre-basemaps.js"></script>
<script src="/js/baseMapControl.js"></script>
</style>
        <div id="map-and-sidebar">
            <aside id="track-sidebar">
            <a href="javascript:history.back()">Lien retour</a>
            <h2 id="track-name">Chargement…</h2>
            <div id="track-meta"></div>
            <h3>Météo</h3>
            <div id="weather-info">Chargement météo…</div>
            <h3>Profil d'élévation</h3>
            <div id="elevation-profile"></div>

            {% if is_owner %}
            <h3>Éditer la trace</h3>
            <form id="edit-form">
                <div class="form-row">
                    <label>Nom</label><br>
                    <input type="text" id="edit-name" />
                </div>
                <div class="form-row">
                    <label>Type</label><br>
                    <input type="text" id="edit-type" />
                </div>
                <div class="form-row">
                    <label>Lien</label><br>
                    <input type="text" id="edit-link" />
                </div>
                <div class="form-row">
                    <label>Commentaire</label><br>
                    <textarea id="edit-comment" rows="4"></textarea>
                </div>
                <button type="submit">Enregistrer</button>
            </form>
            {% endif %} 
        </aside>
        <div id="map"></div>
    </div>
<script>
    const trackId = {{ track_id }};
    const search_control = new maplibreSearchBox.MapLibreSearchControl({
        useMapFocusPoint: true,
        onResultSelected: feature => {
            // console.log(feature.geometry.coordinates);
        }
    });

    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://demotiles.maplibre.org/style.json',
        //center: [11.39085,47.27574],
        zoom: 12,
                    style: {
                version: 8,
                layers: [
                    {
                        id: 'hills',
                        type: 'hillshade',
                        tiles: [demSource.sharedDemProtocolUrl],
                        source: 'hillshadeSource',
                        layout: { visibility: 'visible' },
                        paint: { 'hillshade-shadow-color': '#473B24' }
                    },
                ],
                sources: {
                    // Use a different source for terrain and hillshade layers, to improve render quality
                    terrainSource: {
                        type: 'raster-dem',
                        url: 'https://tiles.mapterhorn.com/tilejson.json'
                    },
                    hillshadeSource: {
                        type: 'raster-dem',
                        url: 'https://tiles.mapterhorn.com/tilejson.json'
                    },
                    contourSourceFeet: {
                        type: 'vector',
                        tiles: [
                            demSource.contourProtocolUrl({
                                // meters to feet
                                multiplier: 3.28084,
                                overzoom: 1,
                                thresholds: {
                                    // zoom: [minor, major]
                                    11: [200, 1000],
                                    12: [100, 500],
                                    13: [100, 500],
                                    14: [50, 200],
                                    15: [20, 100]
                                },
                                elevationKey: 'ele',
                                levelKey: 'level',
                                contourLayer: 'contours'
                            })
                        ],
                        maxzoom: 15
                    }
                },
                terrain: {
                    source: 'terrainSource',
                    exaggeration: 1
                },
                sky: {}
            },

    });
    map.on('load', () => {
        
        map.addControl(search_control, "top-right");
        map.addControl(basemapControl, 'top-right');
        
        map.addControl(
            new maplibregl.NavigationControl({
                visualizePitch: true,
                showZoom: true,
                showCompass: true
        })
        );
        
        map.addControl(
            new maplibregl.TerrainControl({
                source: 'terrainSource',
                exaggeration: 1
        })
        );
        map.addSource('track', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
        map.addLayer({ id:'track-line', type:'line', source:'track', paint: { 'line-color':'#4caf50', 'line-width':4 } });

        map.addSource('waypoints', { type:'geojson', data: { type:'FeatureCollection', features: [] } });
        map.addLayer({ id:'waypoints', type:'circle', source:'waypoints', paint: { 'circle-radius':6, 'circle-color':'#ff8c00', 'circle-stroke-color':'#fff', 'circle-stroke-width':2 } });
        loadData();
    });

    function loadData(){
        fetch('/api/tracks/' + trackId)
            .then(r => r.ok ? r.json() : Promise.reject(r))
            .then(data => {
                // API returns GeoPandas to_json which is GeoJSON-like
                const geo = data;
                if (geo && geo.features && geo.features.length) {
                    map.getSource('track').setData(geo);
                    // fit bounds
                    const coords = geo.features[0].geometry.coordinates;
                    const bounds = coords.reduce((b,c)=> b.extend(c), new maplibregl.LngLatBounds(coords[0], coords[0]));
                    console.log("bounds : ", bounds);
                    map.fitBounds(bounds, { padding:40 });
                    console.log("Bounds ", bounds);
                    const props = geo.features[0].properties || {};
                    document.getElementById('track-name').textContent = props.name || 'Sans nom';
                    document.getElementById('track-meta').innerHTML = '<p>Type: '+(props.type||'')+'<br>Length: '+(props.length||'')+'<br>Elevation gain: '+(props.elevation_gain||'')+'</p>';

                    {% if is_owner %}
                    // prefill edit form
                    document.getElementById('edit-name').value = props.name || '';
                    document.getElementById('edit-type').value = props.type || '';
                    document.getElementById('edit-link').value = props.link || '';
                    document.getElementById('edit-comment').value = props.comment || '';
                    document.title = props.name || 'Track ' + trackId;
                    {% endif %}

                    // fetch and show weather at track midpoint
                    try {
                        const mid = coords[Math.floor(coords.length/2)];
                        if (mid && mid.length >= 2) {
                            fetchWeatherAt(mid[1], mid[0]);
                        }
                    } catch(e) { console.warn('Weather fetch error', e); }

                    // show elevation profile if function available
                    if (typeof showElevationProfile === 'function') {
                        try { showElevationProfile(geo.features[0]); } catch(e) { console.warn(e); }
                    }
                    map.once('moveend', () => {
                    map.setMaxBounds(map.getBounds());
                    });
                    console.log('Initializing weather widget with location', map.getBounds()._ne.lat, map.getBounds()._ne.lng);
                    window.weatherWidgetConfig = window.weatherWidgetConfig || [];
                    window.weatherWidgetConfig.push({
                        selector: ".weatherForecastWidget",
                        apiKey: "SVHYSZMLGR2ZUFJW4ZZGEXNT5",
                        location: bounds._ne.lat + "," + bounds._ne.lng,
                    //    location: "41.92,76.829",
                        unitGroup: "metric"
                    });
                    (function() {
                        var d = document, s = d.createElement('script');
                        s.src = 'https://www.visualcrossing.com/widgets/forecast/weather-forecast-widget-d3.js';
                        s.setAttribute("data-timestamp", +new Date());
                        (d.head || d.body).appendChild(s);
                    })();

                }
            }).catch(err => {
                console.error('Failed to load track', err);
            });

        fetch('/api/waypoints')
            .then(r => r.ok ? r.json() : [])
            .then(wps => {
                const features = (wps || []).map(wp => ({ type:'Feature', geometry:{type:'Point', coordinates:[wp.lng, wp.lat]}, properties:{id:wp.id, description: wp.description, created_at: wp.created_at} }));
                const fc = { type:'FeatureCollection', features };
                if (map.getSource('waypoints')) map.getSource('waypoints').setData(fc);
            }).catch(e => console.warn('Unable to load waypoints', e));
    }

    function fetchWeatherAt(lat, lon){
        const el = document.getElementById('weather-info');
        if (!el) return;
        el.textContent = 'Chargement météo…';
        //const url = `https://api.open-meteo.com/v1/forecast?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lon)}&hourly=precipitation&current_weather=true&timezone=auto`;
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lon)}&current_weather=true&dailycurrent=temperature_2m,wind_speed_10m&hourly=weather_code,temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation&forecast_days=1`;
        fetch(url)
            .then(r => r.ok ? r.json() : Promise.reject(r))
            .then(w => {
                const temp = w.current_weather && typeof w.current_weather.temperature !== 'undefined' ? w.current_weather.temperature : null;
                let precip = null;
                console.log('Weather data', w);
                if (w.hourly && Array.isArray(w.hourly.time) && Array.isArray(w.hourly.precipitation)){
                    const times = w.hourly.time;
                    const precs = w.hourly.precipitation;
                    const now = new Date();
                    // build ISO hour string like 2023-06-30T14:00
                    const isoHour = now.toISOString().slice(0,13)+':00';
                    let idx = times.indexOf(isoHour);
                    if (idx === -1) idx = 0;
                    precip = precs[idx];
                }
                el.innerHTML = '<p>Température: ' + (temp!==null ? (temp + ' °C') : 'N/A') + '<br>Précipitation (heure): ' + (precip!==null ? (precip + ' mm') : 'N/A') + '</p>';
            }).catch(e => {
                console.warn('Unable to fetch weather', e);
                el.textContent = 'Météo indisponible';
            });
    }

    {% if is_owner %}
    document.getElementById('edit-form').addEventListener('submit', (ev)=>{
        ev.preventDefault();
        const payload = {
            name: document.getElementById('edit-name').value,
            type: document.getElementById('edit-type').value,
            link: document.getElementById('edit-link').value,
            comment: document.getElementById('edit-comment').value
        };
        fetch('/api/tracks/' + trackId, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) })
            .then(r => r.ok ? r.json() : r.json().then(j=>Promise.reject(j)))
            .then(resp => { alert('Modifié'); loadData(); })
            .catch(err => { alert('Erreur: '+(err.error||JSON.stringify(err))); });
    });
    {% endif %}

</script>
<div class="weatherForecastWidget" style="background-color: #ffffff99;height: 175px;"></div>


<script src="{{ url_for('static', filename='js/elevation-profile.js') }}"></script>
{% endblock %}
