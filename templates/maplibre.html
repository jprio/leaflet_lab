<br>{% extends "base.html" %}%
{% block content %}


    <div id="map-and-sidebar">
        <aside id="track-sidebar">
            <h2>Traces affichées</h2>
            <div id="track-sidebar-list">
                <div id="track-sidebar-empty">Aucune trace affichée.</div>
            </div>
        </aside>
        <div id="map"></div>
    </div>
    <button id="open-track-filters-button" class="hidden" type="button">Filtres</button>
    <div id="track-filters">
        <div class="filter-header">
            <h3>Filtres</h3>
            <button id="toggle-track-filters" class="secondary toggle" type="button">Masquer</button>
        </div>
        <div id="track-filters-panel">
            <div class="filter-row">
                <label for="filter-collection">Collection</label>
                <select id="filter-collection">
                    <option value="">Toutes les collections</option>
                </select>
            </div>
            <div class="filter-row">
                <label for="filter-name">Nom</label>
                <input id="filter-name" type="search" list="track-name-list" placeholder="Recherche de nom..." />
                <datalist id="track-name-list"></datalist>
            </div>
            <div class="filter-row">
                <label for="filter-type">Type</label>
                <input id="filter-type" type="search" list="track-type-list" placeholder="Contient..." />
                <datalist id="track-type-list"></datalist>
            </div>
            <div class="filter-row">
                <label>Longueur (km)</label>
                <div style="display:flex; gap:10px;">
                    <input id="filter-length-min" type="number" min="0" step="0.1" placeholder="min" />
                    <input id="filter-length-max" type="number" min="0" step="0.1" placeholder="max" />
                </div>
            </div>
            <div class="filter-actions">
                <button id="apply-track-filters">Appliquer</button>
                <button id="clear-track-filters" class="secondary" type="button">Réinitialiser</button>
            </div>
        </div>
    </div>
    <script>
        const demSourceMaptiler = new mlcontour.DemSource({
            url: 'https://api.maptiler.com/tiles/terrain-rgb-v2/{z}/{x}/{y}.webp?key=TJBqVnX8a4CMqkunq4W0',
            encoding: 'mapbox',
            maxzoom: 12,
            // offload contour line computation to a web worker
            worker: true
        });
        const demSource = new mlcontour.DemSource({
            url: "https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png",
            encoding: "terrarium",
            maxzoom: 15,
            worker: true,
            cacheSize: 100,
            timeoutMs: 10_000,
        })
        // console.log(initialStyle);
        demSource.setupMaplibre(maplibregl);
        const osm2 = {
            name: "Open Street Map",
            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
            maxzoom: 18,
            attribution: 'osm'
        }
        const osmHot = {
            name: "OSM Hot",
            tiles: ['https://a.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png'],
        }
        const osmCycle = {
            name: "OSM Cycle",
            tiles: ['https://a.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png'],
        }
        const arcgisHybrid = {
            name: "ArcGis Hybrid",
            tiles: ['https://raw.githubusercontent.com/go2garret/maps/main/src/assets/json/arcgis_hybrid.json'],
            maxzoom: 13,
            attribution: 'Tiles &copy; Esri &mdash; Source: USGS, Esri, TANA, DeLorme, and NPS',
        }
        const google_terrain = {
            name: "Google Maps Terrain",
            type: 'raster',
            tiles: ['https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}'],
            tileSize: 256,
            attribution: '&copy; Google Maps'
        }
        const google_road = {
            name: "Google Maps Road",
            type: 'raster',
            tiles: ['https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}'],
            tileSize: 256,
            attribution: '&copy; Google Maps'
        }

        const google_sat = {
            name: "Google Maps Satellite",
            type: 'raster',
            tiles: ['https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}'],
            tileSize: 256,
            attribution: '&copy; Google Maps'
        }

        const baseLayers = {
            osm2,
            osmHot,
            osmCycle,
            arcgisHybrid,
            google_terrain,
            google_road,
            google_sat
        }   
        const basemapControl = new BasemapControl({ basemaps: baseLayers, initialBasemap: "google_terrain", width: "200px" });

        let currentTracksGeoJSON = null;
        let currentFilterState = {
            collectionId: '',
            name: '',
            type: '',
            minLength: null,
            maxLength: null
        };

        const filterNameInput = document.getElementById('filter-name');
        const filterTypeInput = document.getElementById('filter-type');
        const filterCollectionSelect = document.getElementById('filter-collection');
        const filterTypeList = document.getElementById('track-type-list');
        const filterNameList = document.getElementById('track-name-list');
        const trackFiltersPanel = document.getElementById('track-filters-panel');
        const toggleFilterBtn = document.getElementById('toggle-track-filters');
        const openFiltersBtn = document.getElementById('open-track-filters-button');
        const filterMinInput = document.getElementById('filter-length-min');
        const filterMaxInput = document.getElementById('filter-length-max');
        const applyFilterBtn = document.getElementById('apply-track-filters');
        const clearFilterBtn = document.getElementById('clear-track-filters');

        let filtersVisible = true;

        function updateFilterButtons() {
            toggleFilterBtn.textContent = filtersVisible ? 'Masquer' : 'Afficher';
            openFiltersBtn.classList.toggle('hidden', filtersVisible);
        }

        toggleFilterBtn.addEventListener('click', () => {
            filtersVisible = !filtersVisible;
            trackFiltersPanel.style.display = filtersVisible ? 'block' : 'none';
            updateFilterButtons();
        });

        openFiltersBtn.addEventListener('click', () => {
            filtersVisible = true;
            trackFiltersPanel.style.display = 'block';
            updateFilterButtons();
        });

        filterCollectionSelect.addEventListener('change', () => {
            currentFilterState = getFilterState();
            redraw();
        });

        clearFilterBtn.addEventListener('click', () => {
            filterCollectionSelect.value = '';
            filterNameInput.value = '';
            filterTypeInput.value = '';
            filterMinInput.value = '';
            filterMaxInput.value = '';
            currentFilterState = getFilterState();
            redraw();
        });

        applyFilterBtn.addEventListener('click', () => {
            currentFilterState = getFilterState();
            redraw();
        });

        function getFilterState() {
            return {
                collectionId: filterCollectionSelect.value,
                name: filterNameInput.value.trim().toLowerCase(),
                type: filterTypeInput.value.trim().toLowerCase(),
                minLength: filterMinInput.value ? parseFloat(filterMinInput.value) * 1000 : null,
                maxLength: filterMaxInput.value ? parseFloat(filterMaxInput.value) * 1000 : null
            };
        }

        function applyTrackFilters(geojson) {
            if (!geojson || !geojson.features) return geojson;
            return {
                type: 'FeatureCollection',
                features: geojson.features.filter((feature) => {
                    const props = feature.properties || {};
                    const name = (props.name || '').toString().toLowerCase();
                    const type = (props.type || '').toString().toLowerCase();
                    const length = Number(props.length || 0);

                    if (currentFilterState.name && !name.includes(currentFilterState.name)) {
                        return false;
                    }

                    if (currentFilterState.type && currentFilterState.type !== '' && !type.includes(currentFilterState.type)) {
                        return false;
                    }

                    if (currentFilterState.minLength !== null && length < currentFilterState.minLength) {
                        return false;
                    }

                    if (currentFilterState.maxLength !== null && length > currentFilterState.maxLength) {
                        return false;
                    }

                    return true;
                })
            };
        }

        function populateTrackTypeOptions(geojson) {
            const types = new Set();
            if (!geojson || !geojson.features) return;
            geojson.features.forEach((feature) => {
                const type = (feature.properties?.type || '').toString().trim();
                if (type) {
                    types.add(type);
                }
            });
            filterTypeList.innerHTML = '';
            Array.from(types).sort().forEach((type) => {
                const option = document.createElement('option');
                option.value = type;
                filterTypeList.appendChild(option);
            });
        }

        function populateTrackNameOptions(geojson) {
            const names = new Set();
            if (!geojson || !geojson.features) return;
            geojson.features.forEach((feature) => {
                const name = (feature.properties?.name || '').toString().trim();
                if (name) {
                    names.add(name);
                }
            });
            filterNameList.innerHTML = '';
            Array.from(names).sort().forEach((name) => {
                const option = document.createElement('option');
                option.value = name;
                filterNameList.appendChild(option);
            });
        }

        function populateCollectionOptions(collections) {
            filterCollectionSelect.innerHTML = '<option value="">Toutes les collections</option>';
            collections.forEach((collection) => {
                const option = document.createElement('option');
                option.value = collection.id;
                option.textContent = collection.name;
                filterCollectionSelect.appendChild(option);
            });
        }

        function renderTrackSidebar(geojson) {
            const list = document.getElementById('track-sidebar-list');
            if (!list) return;
            const features = geojson?.features || [];
            if (!features.length) {
                list.innerHTML = '<div id="track-sidebar-empty">Aucune trace affichée.</div>';
                return;
            }
            list.innerHTML = '';
            features.forEach((feature) => {
                const props = feature.properties || {};
                const item = document.createElement('div');
                item.className = 'track-item';

                const title = document.createElement('h4');
                title.textContent = props.name || 'Sans nom';
                item.appendChild(title);

                const rows = [
                    { icon: '📏', label: props.length ? `${(props.length / 1000).toFixed(1)} km` : 'N/A' },
                    { icon: '⛰️', label: props.elevation_gain ? `${props.elevation_gain} m gain` : 'N/A' },
                    { icon: '🧭', label: props.type || 'N/A' }
                ];

                rows.forEach(({ icon, label }) => {
                    const attr = document.createElement('div');
                    attr.className = 'track-attr';
                    attr.innerHTML = `<span class="attr-icon">${icon}</span><span>${label}</span>`;
                    item.appendChild(attr);
                });

                item.addEventListener('click', () => {
                    document.querySelectorAll('.track-item.selected').forEach((el) => el.classList.remove('selected'));
                    item.classList.add('selected');
                    const bounds = new maplibregl.LngLatBounds();
                    const coords = feature.geometry?.coordinates || [];
                    if (feature.geometry?.type === 'LineString') {
                        coords.forEach((coord) => bounds.extend(coord));
                    } else if (feature.geometry?.type === 'MultiLineString') {
                        coords.forEach((line) => line.forEach((coord) => bounds.extend(coord)));
                    } else {
                        bounds.extend(coords);
                    }
                    if (!bounds.isEmpty()) {
                        map.fitBounds(bounds, { padding: 40, maxZoom: 15, duration: 600 });
                    }
                });

                list.appendChild(item);
            });
        }

        function loadCollectionOptions() {
            fetch('/api/collections')
                .then((response) => response.ok ? response.json() : [])
                .then((collections) => {
                    populateCollectionOptions(collections || []);
                })
                .catch((error) => {
                    console.warn('Unable to load collections:', error);
                });
        }

        function loadWaypoints() {
            fetch('/api/waypoints')
                .then((response) => {
                    if (response.status === 401) {
                        console.warn('Waypoints are available only for authenticated users.');
                        return [];
                    }
                    return response.ok ? response.json() : [];
                })
                .then((waypoints) => {
                    const waypointCollection = {
                        type: 'FeatureCollection',
                        features: (waypoints || []).map((wp) => ({
                            type: 'Feature',
                            properties: {
                                id: wp.id,
                                description: wp.description || 'Waypoint',
                                created_at: wp.created_at || null
                            },
                            geometry: {
                                type: 'Point',
                                coordinates: [wp.lng, wp.lat]
                            }
                        }))
                    };
                    if (map.getSource('waypoints')) {
                        map.getSource('waypoints').setData(waypointCollection);
                    }
                })
                .catch((error) => {
                    console.warn('Unable to load waypoints:', error);
                });
        }

        loadCollectionOptions();

        const search_control = new maplibreSearchBox.MapLibreSearchControl({
            useMapFocusPoint: true,
            onResultSelected: feature => {
                // console.log(feature.geometry.coordinates);
            }
        });
        var map = new maplibregl.Map({
            container: 'map',
            zoom: 12,
            center: [11.39085, 47.27574],
            pitch: 30,
            hash: true,
            zooSnap: 1,
            boxZoom: {
                boxZoomEnd: (mapInstance, p0, p1) => {
                    const bounds = mapInstance.getBounds();
                    const ne = bounds.getNorthEast(); // {lng, lat}
                    const sw = bounds.getSouthWest(); // {lng, lat}
                    const ne_lat = Math.round(ne.lat * 10000) / 10000;
                    const ne_lng = Math.round(ne.lng * 10000) / 10000;
                    const sw_lat = Math.round(sw.lat * 10000) / 10000;
                    const sw_lng = Math.round(sw.lng * 10000) / 10000;
                    console.log("Current map bounds:", { ne: { lat: ne_lat, lng: ne_lng }, sw: { lat: sw_lat, lng: sw_lng } });
                    redraw(ne_lat, ne_lng, sw_lat, sw_lng);
                }
            },
            style: {
                version: 8,
                layers: [
                    {
                        id: 'hills',
                        type: 'hillshade',
                        tiles: [demSource.sharedDemProtocolUrl],
                        source: 'hillshadeSource',
                        layout: { visibility: 'visible' },
                        paint: { 'hillshade-shadow-color': '#473B24' }
                    },
                ],
                sources: {
                    // Use a different source for terrain and hillshade layers, to improve render quality
                    terrainSource: {
                        type: 'raster-dem',
                        url: 'https://tiles.mapterhorn.com/tilejson.json'
                    },
                    hillshadeSource: {
                        type: 'raster-dem',
                        url: 'https://tiles.mapterhorn.com/tilejson.json'
                    },
                    contourSourceFeet: {
                        type: 'vector',
                        tiles: [
                            demSource.contourProtocolUrl({
                                // meters to feet
                                multiplier: 3.28084,
                                overzoom: 1,
                                thresholds: {
                                    // zoom: [minor, major]
                                    11: [200, 1000],
                                    12: [100, 500],
                                    13: [100, 500],
                                    14: [50, 200],
                                    15: [20, 100]
                                },
                                elevationKey: 'ele',
                                levelKey: 'level',
                                contourLayer: 'contours'
                            })
                        ],
                        maxzoom: 15
                    }
                },
                terrain: {
                    source: 'terrainSource',
                    exaggeration: 1
                },
                sky: {}
            },
            maxZoom: 18,
            maxPitch: 85
        });

        map.addControl(search_control, "top-right");

        map.addControl(
            new maplibregl.NavigationControl({
                visualizePitch: true,
                showZoom: true,
                showCompass: true
            })
        );

        map.addControl(
            new maplibregl.TerrainControl({
                source: 'terrainSource',
                exaggeration: 1
            })
        );

        map.on('load', () => {
            map.addSource('trails', {
                'type': 'geojson',
                'data': {
                    "type": "FeatureCollection",
                    "features": []
                }
            });

            map.addSource('waypoints', {
                'type': 'geojson',
                'data': {
                    "type": "FeatureCollection",
                    "features": []
                }
            });
            map.addControl(basemapControl, 'top-right');

            map.addLayer({
                'id': 'trails',
                'type': 'line',
                'source': 'trails',
                'layout': {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                'paint': {
                    'line-color': [
                        "case",
                        ["==", ["get", "type"], "HIKE"], "green",
                        ["==", ["get", "type"], "OFFROAD"], "red",
                        "#ccc" // default color
                    ],
                    'line-width': [
                        'case',
                        ['boolean', ['feature-state', 'hover'], false],
                        5, // Largeur au survol
                        2  // Largeur par défaut
                    ],
                    'line-opacity': 0.9
                }
            });

            map.addLayer({
                'id': 'waypoints',
                'type': 'circle',
                'source': 'waypoints',
                'paint': {
                    'circle-radius': 6,
                    'circle-color': '#ff8c00',
                    'circle-stroke-color': '#ffffff',
                    'circle-stroke-width': 2,
                    'circle-opacity': 0.95
                }
            });

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    // map.flyTo({ center: [lng, lat], zoom: 12 });
                })

            loadWaypoints();
            redraw();
        });
        const popup = new maplibregl.Popup({
                closeButton: false,
                closeOnClick: false
            });

        map.on('click', 'trails', (e) => {
            const coordinates = e.features[0].geometry.coordinates.slice();

            // Ensure that if the map is zoomed out such that multiple
            // copies of the feature are visible, the popup appears
            // over the copy being pointed to.
            while (Math.abs(e.lngLat.lng - coordinates[0]) > 180) {
                coordinates[0] += e.lngLat.lng > coordinates[0] ? 360 : -360;
            }
            // console.log(coordinates);

            const feats = map.queryRenderedFeatures(e.point, {
                layers: ['trails'] // Optionnel : limiter à des couches spécifiques
            });
            // console.log("Features at click point:", feats[0].geometry.coordinates);
            // Accéder aux propriétés (ex: 'nom', 'description')
            const props = e.features[0].properties;
            // console.log("e.features[0]:", e.features[0]);
            // console.log(e.features[0].geometry.coordinates);
            console.log("Clicked feature properties:", props);
            const description = '<strong>' + props.name + '</strong>'
                + '<p>'
                + 'Length : ' + props.length + ' <br>'
                + 'Type : ' + props.type + ' <br>'
                + 'Elevation gain : ' + props.elevation_gain + ' <br>'
                + 'Elevation loss : ' + props.elevation_loss + ' <br>'
                + 'Comment : ' + props.comment + '<br>'
                + (props.link ? ('<a href="' + props.link + '" target="_blank">View Link</a><br>') : '')
                + '<a href="/track/' + props.id + '">Voir détail</a><br>'
                + '</p>';

            new maplibregl.Popup()
                .setLngLat(e.lngLat).setHTML(description)
                .addTo(map);
            // console.log("Clicked feature:", e.features[0].geometry.coordinates);
            const bounds = new maplibregl.LngLatBounds();
            const coords = e.features[0].geometry?.coordinates || [];
            if (e.features[0].geometry?.type === 'LineString') {
                coords.forEach((coord) => bounds.extend(coord));
            } else if (e.features[0].geometry?.type === 'MultiLineString') {
                coords.forEach((line) => line.forEach((coord) => bounds.extend(coord)));
            } else {
                bounds.extend(coords);
            }
            if (!bounds.isEmpty()) {
                map.fitBounds(bounds, { padding: 40, maxZoom: 15, duration: 600 });
            }

            map.fitBounds(bounds, { padding: 40, maxZoom: 15, duration: 600 });

            showElevationProfile(e.features[0]);
        });

        const waypointTooltip = new maplibregl.Popup({ closeButton: false, closeOnClick: false });

        map.on('click', 'waypoints', (e) => {
            const props = e.features[0].properties || {};
            const description = '<strong>' + (props.description || 'Waypoint') + '</strong>' +
                '<p>' +
                (props.created_at ? 'Créé le: ' + props.created_at + '<br>' : '') +
                '</p>';

            new maplibregl.Popup()
                .setLngLat(e.lngLat)
                .setHTML(description)
                .addTo(map);
        });

        map.on('mouseenter', 'waypoints', (e) => {
            map.getCanvas().style.cursor = 'pointer';
            const props = e.features[0].properties || {};
            waypointTooltip
                .setLngLat(e.lngLat)
                .setHTML('<strong>' + (props.description || 'Waypoint') + '</strong>')
                .addTo(map);
        });

        map.on('mouseleave', 'waypoints', () => {
            map.getCanvas().style.cursor = '';
            waypointTooltip.remove();
        });

        let hoveredStateId = null;

        map.on('mouseenter', "trails", (e) => {
            // console.log("mouse enter", e);
            // if (e.features.length > 0) {

            // map.setFeatureState({ source: 'trails', id: e.features[0].id }, { hover: true });
            map.getCanvas().style.cursor = 'pointer'
            if (e.features.length > 0) {
                if (hoveredStateId) {
                    map.setFeatureState(
                        { source: 'trails', id: hoveredStateId },
                        { hover: false }
                    );
                }
                hoveredStateId = e.features[0].id;
                map.setFeatureState(
                    { source: 'trails', id: hoveredStateId },
                    { hover: true }
                );
            }
            // }
        });
        map.on('mouseleave', "trails", (e) => {
            // console.log("mouse leave", e);
            // if (e.features.length > 0) {

            // map.setFeatureState({ source: 'trails', id: e.features[0].id }, { hover: false });
            map.getCanvas().style.cursor = ''
            if (hoveredStateId) {
                map.setFeatureState(
                    { source: 'trails', id: hoveredStateId },
                    { hover: false }
                );
            }
            hoveredStateId = null;
            // }
        })
        map.on('moveend', () => {
            redraw();
        });
        map.on('zoomend', () => {
            redraw();
        });

        function redraw() {
            const currentZoom = map.getZoom();
            const bounds = map.getBounds();
            const ne = bounds.getNorthEast(); // {lng, lat}
            const sw = bounds.getSouthWest(); // {lng, lat}
            ne_lat = Math.round(ne.lat * 10000) / 10000;
            ne_lng = Math.round(ne.lng * 10000) / 10000;
            sw_lat = Math.round(sw.lat * 10000) / 10000;
            sw_lng = Math.round(sw.lng * 10000) / 10000;
            const collectionId = currentFilterState.collectionId;
            const url = collectionId ? '/api/collection_tracks/' + collectionId : '/api/find_tracks?NW_lon=' + sw_lng + '&SE_lon=' + ne_lng + '&NW_lat=' + ne_lat + '&SE_lat=' + sw_lat;
            fetch(url)
                .then(function (response) { return response.json(); })
                .then(function (data) {
                    currentTracksGeoJSON = data;
                    populateTrackTypeOptions(data);
                    populateTrackNameOptions(data);
                    const filtered = applyTrackFilters(data);
                    map.getSource("trails").setData(filtered);
                    renderTrackSidebar(filtered);
                });
        };

    </script>
    <script src="{{ url_for('static', filename='js/elevation-profile.js') }}"></script>

{% endblock %}
